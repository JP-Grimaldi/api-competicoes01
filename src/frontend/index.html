<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Convidados</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>
<body>
    <header class="header">
        <h1>Gerenciador de Convidados</h1>
        </header>

    <main class="container">
        <section class="card cria-card">
            <h2>Cadastrar convidado</h2>
            <p class="subtitulo">Preencha os campos abaixo.</p>
            <form id="form-criar" method="post">
                <label for="criar-nome">Nome completo</label>
                <input type="text" id="criar-nome" placeholder="Digite o nome" required/>

                <label for="criar-email">E-mail</label>
                <input type="email" id="criar-email" placeholder="Digite o e-mail" required/>

                <label for="criar-telefone">Telefone</label>
                <input type="tel" id="criar-telefone" placeholder="Digite o telefone" required/>

                <label for="criar-status">Status</label>
                <select id="criar-status">
                    <option value="true" selected>Confirmado</option>
                    <option value="false">Pendente</option>
                </select>
                
                <div class="acoes-post">
                    <button type="submit" class="btn">Criar convidado</button>
                </div>
            </form>
            <p id="mensagem-criar" class="mensagem"></p>
        </section>

        <section class="card lista-card">
            <div class="lista-convidados">
                <h2>Lista de convidados</h2>
                <p class="subtitulo">Clique no botão para carregar os dados.</p>
                <ul id="lista-convidados"></ul>
            </div>
            <div id="acoes-get-convidados" class="btn-lista-convidados">
                <button type="button" id="btn-listar" class="btn">Listar convidados</button>
            </div>
        </section>

        <section class="card atualiza-card">
            <div class="atualiza-convidados">
                <h2>Atualizar convidado</h2>
                <p class="subtitulo">Clique em editar na lista para preencher os campos.</p>
            </div>

            <form id="form-atualizar" method="post">
                <label for="atualizar-id">ID do convidado</label>
                <input type="text" id="atualizar-id" placeholder="Selecione um convidado" required readonly/>

                <label for="atualizar-nome">Nome</label>
                <input type="text" id="atualizar-nome" placeholder="Digite o nome" required/>

                <label for="atualizar-email">E-mail</label>
                <input type="email" id="atualizar-email" placeholder="Digite o e-mail" required/>

                <label for="atualizar-telefone">Telefone</label>
                <input type="tel" id="atualizar-telefone" placeholder="Digite o telefone" required/>
                
                <label for="atualizar-status">Status</label>
                <select id="atualizar-status">
                    <option value="true">Confirmado</option>
                    <option value="false">Pendente</option>
                </select>
                
                <div class="acoes-put">
                    <button type="submit" class="btn">Salvar alteração</button>
                </div>
            </form>
            <p id="mensagem-atualizar" class="mensagem"></p>
        </section>
        
        <section class="card deleta-card">
            <div class="deleta-convidados">
                <h2>Remover convidado</h2>
                <p class="subtitulo">Também dá para excluir direto na lista abaixo.</p>
            </div>
            <div class="lista-convidados-para-remover" id="lista-remocao"></div>
            <p id="mensagem-remover" class="mensagem"></p>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
